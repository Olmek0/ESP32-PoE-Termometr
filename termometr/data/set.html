<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ustawienia</title>
  <style>
	footer {
	  position: fixed;
	  bottom: 0;
	  width: 100%;
	  max-width: 1200px;
	  background-color: var(--secbg);
	  color: var(--wh1); 
	  text-align: center; 
	  padding: 15px 0;
	  border-top: 1px solid var(--wh2);
	}
	footer a { font-weight: bold; }
	footer a:hover { text-decoration: underline; }
	.form-group { margin-bottom: 10px; }
	.btn { margin-top: 10px; }
	#status, #alertStatus { margin-top: 10px; }
	
	.checkbox-group label input[type="checkbox"]:disabled {
		opacity: 0.5;
		cursor: not-allowed;
	}
	.checkbox-group label:has(input:disabled) {
		opacity: 0.6;
		cursor: not-allowed;
	}
  </style>
  <link rel="stylesheet" type="text/css" href="styl.css">
</head>
<body>
<div class="Page">
  <div class="container">
		<div class="Title ShadowL">
			<div id="Titletext">Ustawienia</div>
			<div id="toggleUnit" class="FlexCentre"><span>°C</span></div>
		</div>

    <div class="section-title">Konfiguracja sieci</div>
    <div class="radio-group">
      <label><input type="radio" name="ipmode" id="dhcp" value="dhcp"> DHCP (automatyczne)</label>
      <label><input type="radio" name="ipmode" id="static" value="static"> Statyczny IP</label>
    </div>

    <div id="static-fields" style="display: none;">
      <div class="form-group">
        <label for="ip">Adres IP </label>
        <input type="text" id="ip" placeholder="np. 192.168.1.100">
      </div>
      <div class="form-group">
        <label for="gateway">Brama </label>
        <input type="text" id="gateway" placeholder="np. 192.168.1.1">
      </div>
      <div class="form-group">
        <label for="subnet">Maska podsieci </label>
        <input type="text" id="subnet" placeholder="np. 255.255.255.0">
      </div>
      <div class="form-group">
        <label for="dns1">Serwer DNS 1 </label>
        <input type="text" id="dns1" placeholder="np. 8.8.8.8">
      </div>
      <div class="form-group">
        <label for="dns2">Serwer DNS 2 </label>
        <input type="text" id="dns2" placeholder="np. 8.8.4.4">
      </div>
    </div>

    <button id="save-btn" class="btn">Zapisz konfigurację sieci</button>
    <div id="status"></div>

    <div class="section-title">Konfiguracja alertów WhatsApp</div>
    
    <div class="form-group">
      <label for="highLimit">Górny limit temperatury (<span id="highLabel">°C</span>)</label>
      <input type="number" id="highLimit" step="0.1" placeholder="np. 30.0">
    </div>
    <div class="form-group">
      <label for="lowLimit">Dolny limit temperatury (<span id="lowLabel">°C</span>)</label>
      <input type="number" id="lowLimit" step="0.1" placeholder="np. 10.0">
    </div>
    <div class="form-group">
      <label for="recipientPhone">Numer telefonu</label>
      <input type="text" id="recipientPhone" placeholder="np. 48123456789">
      <span class="helper-text">Format: kod kraju + numer (bez '+' i spacji)</span>
    </div>
    <div class="form-group">
      <label for="apiKey">Klucz API KEY</label>
      <input type="text" id="apiKey" placeholder="Twój klucz API z callmebot">
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="alertsEnabled"> 
        <strong>Włącz alerty WhatsApp</strong>
      </label>
      <label>
        <input type="checkbox" id="testEnabled"> 
        <strong>Włącz alert testowy</strong>
				<span id="cooldownTimer" style="display: none; color: #ff9800;"></span>
      </label>
    </div>

    <div class="inline-group">
      <button id="save-alerts-btn" class="btn">Zapisz ustawienia alertów</button>
    </div>
    <div id="alertStatus"></div>

	
	  <div class="section-title">Ustawienia czasu</div>
    <div class="form-group">
      <label for="timezoneSelect">Strefa czasowa</label>
      <select id="timezoneSelect" class="timezone-select">
        <option value="CET-1CEST,M3.5.0/2,M10.5.0/3">🇪🇺 Europa Środkowa (CET)</option>
        <option value="GMT0BST,M3.5.0/1,M10.5.0/2">🇬🇧 Londyn (GMT/BST)</option>
        <option value="WET0WEST,M3.5.0/1,M10.5.0/2">🇵🇹 Portugalia (WET)</option>
        <option value="EET-2EEST,M3.5.0/3,M10.5.0/4">🇬🇷 Grecja (EET)</option>
        <option value="EST5EDT">🇺🇸 Nowy Jork (EST/EDT)</option>
        <option value="CST6CDT">🇺🇸 Chicago (CST/CDT)</option>
        <option value="MST7MDT">🇺🇸 Denver (MST/MDT)</option>
        <option value="PST8PDT">🇺🇸 Los Angeles (PST/PDT)</option>
        <option value="AST4ADT">🇨🇦 Halifax (AST/ADT)</option>
        <option value="JST-9">🇯🇵 Tokio (JST)</option>
        <option value="CST-8">🇨🇳 Chiny (CST)</option>
        <option value="IST-5:30">🇮🇳 Indie (IST)</option>
        <option value="AEST-10AEDT,M10.1.0/2,M4.1.0/3">🇦🇺 Sydney (AEST/AEDT)</option>
        <option value="NZST-12NZDT,M9.5.0/2,M4.1.0/3">🇳🇿 Nowa Zelandia (NZST/NZDT)</option>
      </select>
    </div>
    <button id="save-timezone-btn" class="btn">Zapisz strefę czasową</button>
    <div id="timezoneStatus"></div>
	
  </div>
	
  <footer>
    <a href="/">← Powrót do strony głównej</a>
  </footer>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  
	const COOLDOWN_SECONDS = 30;
	const STORAGE_KEY = 'lastTestAlertTime';
	
	let alertConfigCache = { high: 30.0, low: 10.0, highF: 86.0, lowF: 50.0 };
	let useFahrenheit = localStorage.getItem('tempUnit') === 'F';

	function cooldown(action) {
		const testCheckbox = document.getElementById('testEnabled');
		const timerSpan = document.getElementById('cooldownTimer');
		
		if (action === 'check') {
			const stored = localStorage.getItem(STORAGE_KEY);
			if (!stored) return 0;
			const remaining = Math.max(0, Math.ceil(COOLDOWN_SECONDS - (Date.now() - parseInt(stored)) / 1000));
			return remaining;
		}
		
		if (action === 'set') {
			localStorage.setItem(STORAGE_KEY, Date.now().toString());
			testCheckbox.disabled = true;
			testCheckbox.checked = false;
			timerSpan.style.display = 'inline';
			timerSpan.textContent = `(${COOLDOWN_SECONDS}s)`;
			return;
		}
		
		if (action === 'update') {
			const remaining = cooldown('check');
			const active = remaining > 0;
			
			testCheckbox.disabled = active;
			if (active) {
				testCheckbox.checked = false;
				timerSpan.style.display = 'inline';
				timerSpan.textContent = `(${remaining}s)`;
			} else {
				timerSpan.style.display = 'none';
				testCheckbox.disabled = false;
			}
			return;
		}
	}
		
	function loadNetworkConfig() {
		fetch('/api/ipconfig')
			.then(res => res.json())
			.then(data => {
				document.getElementById('dhcp').checked = data.dhcp;
				document.getElementById('static').checked = !data.dhcp;
				document.getElementById('static-fields').style.display = data.dhcp ? 'none' : 'block';

				if (!data.dhcp) {
					document.getElementById('ip').value = data.ip || '';
					document.getElementById('gateway').value = data.gateway || '';
					document.getElementById('subnet').value = data.subnet || '';
					document.getElementById('dns1').value = data.dns1 || '';
					document.getElementById('dns2').value = data.dns2 || '';
				}
			})
			.catch(err => {
				showStatus('status', 'Nie udało się pobrać konfiguracji sieci, odśwież stronę', 'warning');
				console.error(err);
			});
	}
	
	 function loadTimezoneConfig() {
    fetch('/api/timezone')
      .then(res => res.json())
      .then(data => {
        if (data.timezone) {
          const select = document.getElementById('timezoneSelect');
          for (let option of select.options) {
            if (option.value === data.timezone) {
              option.selected = true;
              break;
            }
          }
          showStatus('timezoneStatus', 'Aktualna strefa czasowa załadowana', 'info');
        }
      })
      .catch(err => {
        showStatus('timezoneStatus', 'Nie udało się pobrać konfiguracji strefy czasowej', 'warning');
        console.error(err);
      });
  }

  document.querySelectorAll('input[name="ipmode"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.getElementById('static-fields').style.display = this.value === 'static' ? 'block' : 'none';
    });
  });

  function isValidIP(ip) {
    const pattern = /^(\d{1,3}\.){3}\d{1,3}$/;
    if (!pattern.test(ip)) return false;
    const parts = ip.split('.');
    return parts.every(part => {
      const num = parseInt(part);
      return num >= 0 && num <= 255;
    });
  }

  function validateNetworkConfig(data) {
    if (!data.dhcp) {
      const fields = ['ip', 'gateway', 'subnet', 'dns1', 'dns2'];
      for (let field of fields) {
        const value = document.getElementById(field).value.trim();
        if (!value) {
          showStatus('status', `Pole "${field}" nie może być puste`, 'error');
          return false;
        }
        if (field !== 'dns2' && !isValidIP(value)) {
          showStatus('status', `Nieprawidłowy adres w polu "${field}"`, 'error');
          return false;
        }
        if (field === 'dns2' && value && !isValidIP(value)) {
          showStatus('status', `Nieprawidłowy adres DNS2`, 'error');
          return false;
        }
      }
			if (data.ip === data.gateway) {
        showStatus('status', 'Adres IP nie może być taki sam jak Brama.', 'error');
        return false;
      }
    }
    return true;
  }
	
	function checkServerOnline(retries, delay) {
		return new Promise((resolve, reject) => {
			let attempts = 0;
			const maxAttempts = retries || 30;
			const interval = delay || 1000;
			
			function check() {
				attempts++;
				fetch('/api/ipconfig')
					.then(res => {
						if (res.ok) {
							resolve(true);
						} else {
							throw new Error('Serwer nie jest gotowu');
						}
					})
					.catch(() => {
						if (attempts < maxAttempts) {
							setTimeout(check, interval);
						} else {
							reject(new Error('Serwer nie odpowiada po ' + maxAttempts + ' próbach'));
						}
					});
			}
			
			check();
		});
	}

  document.getElementById('save-btn').addEventListener('click', async function() {
		const isDhcp = document.getElementById('dhcp').checked;
		const config = { dhcp: isDhcp };

		if (!isDhcp) {
			config.ip = document.getElementById('ip').value.trim();
			config.gateway = document.getElementById('gateway').value.trim();
			config.subnet = document.getElementById('subnet').value.trim();
			config.dns1 = document.getElementById('dns1').value.trim();
			config.dns2 = document.getElementById('dns2').value.trim();
		}

		if (!validateNetworkConfig(config)) return;

		showStatus('status', 'Testowanie i zapisywanie konfiguracji...', 'info');
		this.disabled = true;
		this.textContent = 'Zapisywanie...';

		try {
			const response = await fetch('/api/ipconfig', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(config),
			});

			if (response.ok) {
				const data = await response.json();
				showStatus('status', 'Konfiguracja zapisana. Oczekiwanie na restart sieci...', 'info');
				
				try {
					await checkServerOnline(30, 1000);
					showStatus('status', 'Urządzenie jest ponownie dostępne! Odświeżanie strony...', 'success');
					setTimeout(() => { window.location.reload(); }, 2000);
				} catch (timeoutError) {
					showStatus('status', 'Urządzenie nie odpowiada po zmianie konfiguracji.<br>Sprawdź nowy adres IP i spróbuj ponownie połączyć się ręcznie.', 'warning');
					this.disabled = false;
					this.textContent = 'Zapisz konfigurację sieci';
				}
			} else {
				const data = await response.json();
				let errorMsg = data.message || data.error || 'Nieznany błąd';
				showStatus('status', `${errorMsg}`, 'error');
				this.disabled = false;
				this.textContent = 'Zapisz konfigurację sieci';
			}
		} catch (err) {
			if (err.message.includes('Failed to fetch') || err.message.includes('Connection reset')) {
				showStatus('status', 'Połączenie przerwane podczas zmiany konfiguracji.<br>Oczekiwanie na ponowne połączenie z urządzeniem...', 'info');
				
				try {
					await checkServerOnline(30, 1000);
					showStatus('status', 'Urządzenie jest ponownie dostępne... Odświeżanie strony...', 'success');
					setTimeout(() => { window.location.reload(); }, 2000);
				} catch (timeoutError) {
					showStatus('status', 'Urządzenie nie odpowiada po zmianie konfiguracji.<br>Sprawdź nowy adres IP i spróbuj ponownie połączyć się ręcznie.', 'warning');
					this.disabled = false;
					this.textContent = 'Zapisz konfigurację sieci';
				}
			} else {
				showStatus('status', `Błąd: ${err.message || 'Nieznany błąd'}`, 'error');
				this.disabled = false;
				this.textContent = 'Zapisz konfigurację sieci';
			}
		}
	});
	
	function updateInputFieldsView() {
		const highInput = document.getElementById('highLimit');
		const lowInput = document.getElementById('lowLimit');
		
		document.getElementById('highLabel').textContent = useFahrenheit ? '°F' : '°C';
		document.getElementById('lowLabel').textContent = useFahrenheit ? '°F' : '°C';

		if (useFahrenheit) {
			highInput.value = !isNaN(alertConfigCache.highF) ? alertConfigCache.highF : '';
			lowInput.value = !isNaN(alertConfigCache.lowF) ? alertConfigCache.lowF : '';
			highInput.placeholder = "np. 86.0";
			lowInput.placeholder = "np. 50.0";
		} else {
			highInput.value = !isNaN(alertConfigCache.high) ? alertConfigCache.high : '';
			lowInput.value = !isNaN(alertConfigCache.low) ? alertConfigCache.low : '';
			highInput.placeholder = "np. 30.0";
			lowInput.placeholder = "np. 10.0";
		}
	}

	document.getElementById('highLimit').addEventListener('input', function() {
		if (useFahrenheit) alertConfigCache.highF = parseFloat(this.value);
		else alertConfigCache.high = parseFloat(this.value);
	});

	document.getElementById('lowLimit').addEventListener('input', function() {
		if (useFahrenheit) alertConfigCache.lowF = parseFloat(this.value);
		else alertConfigCache.low = parseFloat(this.value);
	});
	
  function loadAlertConfig() {
    fetch('/api/alertconfig')
      .then(res => res.json())
      .then(data => {
        alertConfigCache.high = data.high;
        alertConfigCache.low = data.low;
        alertConfigCache.highF = data.highF || (data.high * 1.8 + 32).toFixed(1);
        alertConfigCache.lowF = data.lowF || (data.low * 1.8 + 32).toFixed(1);
		
        document.getElementById('recipientPhone').value = data.phone || '';
        document.getElementById('apiKey').value = data.apikey || '';
        document.getElementById('alertsEnabled').checked = data.alertsEnabled || false;
        document.getElementById('testEnabled').checked = data.testEnabled || false;
				
				updateInputFieldsView();
				cooldown('update');
      })
      .catch(err => {
        showStatus('alertStatus', 'Nie udało się pobrać konfiguracji alertów', 'error');
        console.error(err);
      });
  }

  document.getElementById('save-alerts-btn').addEventListener('click', async function() {
    const phone = document.getElementById('recipientPhone').value.trim();
    const apikey = document.getElementById('apiKey').value.trim();
    const alertsEnabled = document.getElementById('alertsEnabled').checked;
    const testEnabled = document.getElementById('testEnabled').checked;

    if (isNaN(alertConfigCache.high) || isNaN(alertConfigCache.low) || isNaN(alertConfigCache.highF) || isNaN(alertConfigCache.lowF)) {
      showStatus('alertStatus', 'Proszę podać prawidłowe wartości temperatur', 'error');
      return;
    }
    
    if (useFahrenheit) {
			alertConfigCache.high = parseFloat(((alertConfigCache.highF - 32) / 1.8).toFixed(1));
			alertConfigCache.low = parseFloat(((alertConfigCache.lowF - 32) / 1.8).toFixed(1));
    } else {
			alertConfigCache.highF = parseFloat((alertConfigCache.high * 1.8 + 32).toFixed(1));
			alertConfigCache.lowF = parseFloat((alertConfigCache.low * 1.8 + 32).toFixed(1));
    }

    if (alertConfigCache.high <= alertConfigCache.low) {
      showStatus('alertStatus', 'Górny limit musi być większy od dolnego', 'error');
      return;
    }
    if (alertsEnabled && (!phone || !apikey)) {
      showStatus('alertStatus', 'Przy włączonych alertach należy podać numer telefonu i klucz API', 'error');
      return;
    }

    const alertConfig = {
      high: alertConfigCache.high,
      low: alertConfigCache.low,
      highF: alertConfigCache.highF,
      lowF: alertConfigCache.lowF,
      phone: phone,
      apikey: apikey,
      alertsEnabled: alertsEnabled,
			testEnabled: testEnabled,
			useFahrenheit: useFahrenheit
    };

    showStatus('alertStatus', 'Zapisywanie ustawień alertów...', 'info');
    this.disabled = true;
    this.textContent = 'Zapisywanie...';

    try {
      const response = await fetch('/api/alertconfig', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(alertConfig)
      });

      if (response.ok) {
        showStatus('alertStatus', 'Ustawienia alertów zapisane pomyślnie', 'success');
				if (alertsEnabled && testEnabled) {
					if (cooldown('check') > 0) {
						document.getElementById('testEnabled').checked = false;
					} else {
						showStatus('alertStatus', 'Wysyłanie testowego alertu...', 'info');
						
						const testResponse = await fetch('/api/testalert', { method: 'POST' });
						const testData = await testResponse.json();
						
						if (testResponse.ok) {
							showStatus('alertStatus', 'Ustawienia zapisane. Testowy alert wysłany pomyślnie!', 'success');
							cooldown('set');
							
							const testCheckbox = document.getElementById('testEnabled');
							testCheckbox.checked = false;
							testCheckbox.disabled = true;
														
							setTimeout(() => { cooldown('update'); }, COOLDOWN_SECONDS * 1000);
						} else {
							showStatus('alertStatus', `Ustawienia zapisane, ale testowy alert nie został wysłany: ${testData.error || 'Unknown error'}`, 'warning');
						}
					}
				}
      } else {
        const errorData = await response.json();
        showStatus('alertStatus', `Błąd zapisu: ${errorData.error || 'Unknown error'}`, 'error');
      }
    } catch (err) {
      showStatus('alertStatus', 'Błąd połączenia z serwerem', 'error');
      console.error(err);
    } finally {
      this.disabled = false;
      this.textContent = 'Zapisz ustawienia alertów';
    }
  });
	
	 document.getElementById('save-timezone-btn').addEventListener('click', async function() {
    const select = document.getElementById('timezoneSelect');
    const selectedTimezone = select.value;
    
    if (!selectedTimezone) {
      showStatus('timezoneStatus', 'Wybierz strefę czasową', 'error');
      return;
    }

    showStatus('timezoneStatus', 'Zapisywanie strefy czasowej...', 'info');
    this.disabled = true;
    this.textContent = 'Zapisywanie...';

    try {
      const response = await fetch('/api/timezone', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ timezone: selectedTimezone })
      });

      if (response.ok) {
        showStatus('timezoneStatus', 'Strefa czasowa zapisana pomyślnie!', 'success');
        setTimeout(() => { window.location.reload(); }, 1500);
      } else {
        const errorData = await response.json();
        showStatus('timezoneStatus', `Błąd zapisu: ${errorData.error || 'Unknown error'}`, 'error');
      }
    } catch (err) {
      showStatus('timezoneStatus', 'Błąd połączenia z serwerem', 'error');
      console.error(err);
    } finally {
      this.disabled = false;
      this.textContent = 'Zapisz strefę czasową';
    }
  });

  function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.innerHTML = msg;
    el.className = type || '';
    el.style.display = 'block';
  }

  loadNetworkConfig();
  loadAlertConfig();
	
  loadTimezoneConfig();
	
	setInterval(() => { cooldown('update'); }, 1000);
	
	const toggleUnit = document.getElementById('toggleUnit');
	const unitSpan = toggleUnit.querySelector('span');
	unitSpan.textContent = useFahrenheit ? '°F' : '°C';

	toggleUnit.addEventListener('click', function() {
		useFahrenheit = !useFahrenheit;
		localStorage.setItem('tempUnit', useFahrenheit ? 'F' : 'C');
		const newUnit = useFahrenheit ? '°F' : '°C';
		fadeText(document.getElementById("toggleUnit").querySelector('span'), newUnit);
		updateInputFieldsView();
	});
	
	function fadeText(element, newText) {
    if (!element) return;
    const targetElement = element.querySelector('span') || element;
    targetElement.classList.remove('fade-in');
    targetElement.classList.add('fade-out');

    setTimeout(() => {
        targetElement.textContent = newText;
        targetElement.classList.remove('fade-out');
        targetElement.classList.add('fade-in');
        setTimeout(() => { targetElement.classList.remove('fade-in'); }, 300); 
    }, 300); 
	}
});
</script>
</body>
</html>
